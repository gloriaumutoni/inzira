name: CI

# Runs on every push and every PR targeting dev or main

on:

  push:

    branches: [main, dev]

  pull_request:

    branches: [main, dev]

jobs:

  # Check the backend

  server:

    name: Server — typecheck

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code

        uses: actions/checkout@v4

      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: '20'

          cache: 'npm'

          cache-dependency-path: server/package-lock.json

      - name: Install dependencies

        working-directory: server

        run: npm ci

      # Check TypeScript types without compiling

      # This catches type errors, missing imports, wrong function signatures

      - name: TypeScript check

        working-directory: server

        run: npx tsc --noEmit

  # Check the frontend

  client:

    name: Client — typecheck + build

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code

        uses: actions/checkout@v4

      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: '20'

          cache: 'npm'

          cache-dependency-path: client/package-lock.json

      - name: Install dependencies

        working-directory: client

        run: npm ci

      # Check TypeScript types

      - name: TypeScript check

        working-directory: client

        run: npx tsc --noEmit

      # Try to build — catches anything tsc missed

      # VITE_API_URL gets a placeholder value so the build does not fail

      # without the secret being set

      - name: Build

        working-directory: client

        run: npm run build

        env:

          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:3001/api/v1' }}name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — typecheck + prisma
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: "postgresql://postgres:password@localhost:5432/inzira_test"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: TypeScript typecheck
        run: npx tsc --noEmit

  client:
    name: Client — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_BASE_URL: "https://inzira-server.onrender.com"
